name: maze-book

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maze-book-app
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - maze-book-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  maze-book-net:
    driver: bridge
